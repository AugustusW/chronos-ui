name: Release

# Build the Windows installer and attach it to the GitHub Release for a tag.
#
# macOS is NOT built here. The Developer ID signing key is Cloud-managed and cannot be exported
# to a .p12 for CI, so the signed + notarized macOS .dmg is built and uploaded LOCALLY — see
# RELEASING.md ("macOS — local build"). The Windows .exe is unsigned (no Authenticode cert;
# first-run SmartScreen note is in the README).
#
# Trigger: push a tag like v0.1.1, or run manually (workflow_dispatch) against an existing tag.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build a release for (e.g. v0.1.1)'
        required: true

permissions:
  contents: write # create/update the Release and upload assets

jobs:
  windows:
    # Pinned to windows-2022 (not windows-latest, now windows-2025): node-gyp 10.x can't locate
    # Visual Studio on the 2025 image, and rebuild-native.mjs compiles better-sqlite3 from source.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: '>=1.25'
      - name: Install
        run: npm ci
      - name: Build exe (unsigned)
        run: npm run dist:win
        env:
          # No Windows code-signing cert: ensure electron-builder does not attempt signing.
          CSC_LINK: ''
          CSC_KEY_PASSWORD: ''
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          fail_on_unmatched_files: false
          files: dist/*.exe
