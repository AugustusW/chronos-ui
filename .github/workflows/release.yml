name: Release

# Build installers and attach them to the GitHub Release for a tag.
#   macOS  → signed + notarized .dmg  (Developer ID + ASC API key, from secrets)
#   Windows → unsigned .exe (NSIS)    (no code-signing cert; SmartScreen note in README)
#
# Trigger: push a tag like v0.1.1, or run manually (workflow_dispatch) against an existing tag.
# Required repo secrets (see RELEASING.md) — only the macOS job needs them:
#   CSC_LINK            base64 of the Developer ID Application .p12
#   CSC_KEY_PASSWORD    password for that .p12
#   APPLE_API_KEY_B64   base64 of the App Store Connect API key .p8
#   APPLE_API_KEY_ID    the ASC API key id
#   APPLE_API_ISSUER    the ASC API issuer id
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build a release for (e.g. v0.1.1)'
        required: true

permissions:
  contents: write # create/update the Release and upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: '>=1.25'
      - name: Install
        run: npm ci

      # ── macOS: signed + notarized dmg ────────────────────────────────
      - name: Prepare Apple API key (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "$APPLE_API_KEY_B64" | base64 --decode > "$RUNNER_TEMP/asc_api_key.p8"
          echo "APPLE_API_KEY=$RUNNER_TEMP/asc_api_key.p8" >> "$GITHUB_ENV"
        env:
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY_B64 }}
      - name: Build dmg (macOS)
        if: runner.os == 'macOS'
        run: npm run dist:mac
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      # ── Windows: unsigned exe ────────────────────────────────────────
      - name: Build exe (Windows, unsigned)
        if: runner.os == 'Windows'
        run: npm run dist:win
        env:
          # No Windows code-signing cert: ensure electron-builder does not attempt signing.
          CSC_LINK: ''
          CSC_KEY_PASSWORD: ''

      # ── attach installers to the Release ─────────────────────────────
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          fail_on_unmatched_files: false
          files: |
            dist/*.dmg
            dist/*.exe
