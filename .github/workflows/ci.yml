name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  # Postgres-backed data-layer tests. GitHub Actions `services:` only run on Linux runners, so this
  # is a dedicated ubuntu job (the `check` matrix is macOS/Windows). It sets TEST_PG_URL so the
  # otherwise-skipped Postgres path in the repository suite runs against a real database.
  test-pg:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm ci
      - name: Test (Postgres + SQLite)
        run: npm test
        env:
          TEST_PG_URL: postgres://postgres:test@localhost:5432/postgres

  schedmgr:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '>=1.25'
          cache-dependency-path: schedmgr/go.sum
      - name: Vet
        working-directory: schedmgr
        run: go vet ./...
      - name: Test
        working-directory: schedmgr
        run: go test ./...
      - name: Build
        working-directory: schedmgr
        env:
          CGO_ENABLED: 0
        run: go build ./...

  # schedmgr's Postgres store test needs a real database. GitHub Actions `services:` run only on
  # Linux, so this is a dedicated ubuntu job (the `schedmgr` matrix above is macOS/Windows). It sets
  # TEST_PG_URL so the otherwise-skipped Postgres store test runs.
  schedmgr-pg:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '>=1.25'
          cache-dependency-path: schedmgr/go.sum
      - name: Test (Postgres)
        working-directory: schedmgr
        env:
          CGO_ENABLED: 0
          TEST_PG_URL: postgres://postgres:test@localhost:5432/postgres
        run: go test ./...
